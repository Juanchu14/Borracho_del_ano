# Configuración de ejemplo de Nginx como proxy inverso.
# Cópiala a /etc/sites-available/borracho-del-ano y enlázala en sites-enabled.
# Sustituye "tu-dominio-o-ip" por tu dominio (si tienes uno) o la IP de tu servidor.
#
# Esto es opcional: la app funciona igualmente accediendo directamente a
# http://IP-DE-TU-SERVIDOR:3000 sin pasar por Nginx.

server {
    listen 80;
    server_name tu-dominio-o-ip;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# Para HTTPS con un dominio propio, instala certbot y ejecuta:
#   sudo certbot --nginx -d tu-dominio
# y se encargará de añadir el bloque "listen 443 ssl" automáticamente.
